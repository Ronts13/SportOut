version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: sportout
      POSTGRES_PASSWORD: sportout
      POSTGRES_DB: sportout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://sportout:sportout@db:5432/sportout
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  pgdata:
